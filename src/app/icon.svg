<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Clip to home plate shape -->
    <clipPath id="plate">
      <polygon points="200,20 370,120 370,300 200,380 30,300 30,120"/>
    </clipPath>
  </defs>

  <!-- Dark background -->
  <rect width="400" height="400" fill="#0f1115"/>

  <!-- Home plate hexagon outline -->
  <polygon points="200,20 370,120 370,300 200,380 30,300 30,120"
    fill="none" stroke="#39ff14" stroke-width="3"/>

  <!-- "13" large, tight, geometric -->
  <text x="200" y="240" font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="160" font-weight="900" fill="#39ff14"
    text-anchor="middle" letter-spacing="-8">13</text>

  <!-- "RUN LEAGUE" small caps beneath -->
  <text x="200" y="310" font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="400" fill="white"
    text-anchor="middle" letter-spacing="12">RUN LEAGUE</text>
</svg>