<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Dark background -->
  <rect width="180" height="180" fill="#0a0a0a"/>

  <!-- Rounded corner background for iOS appearance -->
  <rect width="180" height="180" rx="30" fill="#1a1a1a" stroke="#39ff14" stroke-width="3"/>

  <!-- Baseball seams -->
  <path d="M 45 60 Q 90 45 135 60" fill="none" stroke="#39ff14" stroke-width="2" stroke-linecap="round"/>
  <path d="M 45 120 Q 90 135 135 120" fill="none" stroke="#39ff14" stroke-width="2" stroke-linecap="round"/>

  <!-- "13" text in neon green -->
  <text x="90" y="100" font-family="monospace" font-size="60" font-weight="bold" fill="#39ff14" text-anchor="middle" dominant-baseline="middle">
    13
  </text>
</svg>
