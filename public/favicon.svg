<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark textured background -->
  <rect width="256" height="256" fill="#0a0a0a"/>
  <circle cx="128" cy="128" r="120" fill="#1a1a2e"/>

  <!-- Top left baseball seams (red) -->
  <path d="M 30 40 Q 50 35 70 45" fill="none" stroke="#ff3333" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 28 48 Q 48 40 68 52" fill="none" stroke="#ff3333" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 32 56 Q 52 48 72 60" fill="none" stroke="#ff3333" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Bottom right baseball seams (red) -->
  <path d="M 226 196 Q 206 201 186 211" fill="none" stroke="#ff3333" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 228 204 Q 208 212 188 218" fill="none" stroke="#ff3333" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 224 212 Q 204 220 184 226" fill="none" stroke="#ff3333" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>

  <!-- "13" text in neon green with glow -->
  <text x="128" y="160" font-family="monospace" font-size="140" font-weight="900" fill="#39ff14" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)" letter-spacing="0">
    13
  </text>
</svg>
